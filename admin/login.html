<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập Admin — Nhâm Mobile Dev</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/redesign.css?v=20260612" />
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --card: #111120;
      --border: rgba(255,255,255,0.08);
      --border-h: rgba(255,255,255,0.16);
      --text: #eeeeff;
      --text2: #8888bb;
      --text3: #44445a;
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --accent-glow: rgba(124,109,250,0.4);
      --accent-dim: rgba(124,109,250,0.12);
      --green: #4ade80;
      --red: #f87171;
      --font: 'Inter', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg: #f0f0ff;
      --card: #fff;
      --border: rgba(0,0,0,0.08);
      --border-h: rgba(0,0,0,0.15);
      --text: #0a0a1a;
      --text2: #555580;
      --text3: #aaaacc;
      --accent: #5b4fdc;
      --accent2: #7c6dfa;
      --accent-glow: rgba(91,79,220,0.3);
      --accent-dim: rgba(91,79,220,0.1);
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated Aurora Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 15%, rgba(124,109,250,0.22), transparent 50%),
        radial-gradient(ellipse 70% 50% at 90% 85%, rgba(167,139,250,0.16), transparent 45%),
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(59,130,246,0.10), transparent 55%),
        radial-gradient(ellipse 50% 35% at 70% 20%, rgba(52,211,153,0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: auroraShift 15s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle 300px at 20% 30%, rgba(124,109,250,0.12), transparent),
        radial-gradient(circle 200px at 80% 70%, rgba(236,72,153,0.08), transparent),
        radial-gradient(circle 250px at 60% 20%, rgba(34,211,153,0.06), transparent);
      animation: orbFloat 20s ease-in-out infinite alternate-reverse;
    }

    @keyframes auroraShift {
      0%   { opacity: 1; filter: hue-rotate(0deg); }
      33%  { opacity: 0.85; }
      66%  { opacity: 0.95; filter: hue-rotate(8deg); }
      100% { opacity: 1; filter: hue-rotate(0deg); }
    }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
      50%  { transform: translate(-20px, 15px) scale(1.1); opacity: 1; }
      100% { transform: translate(10px, -10px) scale(0.95); opacity: 0.8; }
    }

    /* Login Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      box-shadow: 0 0 60px rgba(124,109,250,0.12), 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Top glow line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), rgba(96,165,250,0.8), var(--accent), transparent);
      border-radius: 0 0 100px 100px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .login-logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px var(--accent-glow);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 20px var(--accent-glow); }
      50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(124,109,250,0.15); }
    }

    .login-logo svg { color: #fff; }

    .login-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--text2);
    }

    /* Form */
    .login-form { display: flex; flex-direction: column; gap: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 0.875rem;
      color: var(--text3);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.875rem 0.7rem 2.75rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    [data-theme="light"] .form-input { background: #f8f8ff; }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
      background: rgba(124,109,250,0.04);
    }

    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent2); }

    .form-input::placeholder { color: var(--text3); }

    .show-pw-btn {
      position: absolute;
      right: 0.875rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .show-pw-btn:hover { color: var(--text2); }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      padding: 0.65rem 0.875rem;
      font-size: 0.82rem;
      color: var(--red);
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Submit button */
    .login-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      font-size: 0.925rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      border: none;
      cursor: pointer;
      transition: all 0.22s;
      box-shadow: 0 0 24px var(--accent-glow);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #60a5fa, var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px var(--accent-glow); }
    .login-btn:hover::after { opacity: 1; }
    .login-btn span { position: relative; z-index: 1; }
    .login-btn svg { position: relative; z-index: 1; }

    .login-btn.loading { pointer-events: none; opacity: 0.8; }

    /* Loader spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      position: relative;
      z-index: 1;
    }
    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { display: none; }

    /* Info box */
    .login-hint {
      background: var(--accent-dim);
      border: 1px solid rgba(124,109,250,0.2);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      margin-top: 1.25rem;
    }

    .login-hint-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .login-hint p {
      font-size: 0.78rem;
      color: var(--text2);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      font-variant-numeric: tabular-nums;
    }

    .hint-label { color: var(--text3); min-width: 65px; }
    .hint-val { color: var(--accent2); font-weight: 600; letter-spacing: 0.03em; }

    /* Back link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--text2);
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* Theme toggle */
    .theme-toggle-fixed {
      position: fixed;
      top: 1.25rem; right: 1.25rem;
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    .theme-toggle-fixed:hover { color: var(--text); border-color: var(--border-h); }
    [data-theme="dark"] .sun-icon { display: none; }
    [data-theme="dark"] .moon-icon { display: block; }
    [data-theme="light"] .moon-icon { display: none; }
    [data-theme="light"] .sun-icon { display: block; }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle-fixed" id="themeToggle" title="Đổi giao diện">
    <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- Login Card -->
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18" stroke-linecap="round" stroke-width="3.5"/></svg>
      </div>
      <div>
        <div class="login-title">Nhâm <span style="color:var(--accent2)">Mobile Dev</span></div>
        <div class="login-sub">Đăng nhập để vào Admin Panel</div>
      </div>
    </div>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="error-msg" id="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Tài khoản hoặc mật khẩu không đúng!</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Tài khoản</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Tên đăng nhập"
            autocomplete="username"
            required
            style="padding-left:2.75rem"
          />
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Mật khẩu</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            style="padding-left:2.75rem;padding-right:4rem"
          />
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button type="button" class="show-pw-btn" id="showPwBtn" onclick="togglePassword()">Hiện</button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text" style="display:flex;align-items:center;gap:0.5rem">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Đăng nhập
        </span>
      </button>
    </form>


    <a href="../index.html" class="back-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Quay về trang chủ
    </a>
  </div>

  <script>
    // ---- Theme ----
    const savedTheme = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // ---- API Config ----
    const API_BASE = `${window.location.protocol}//${window.location.hostname}:3000/api`;
    const TOKEN_KEY = 'nhamblog_jwt_token';

    // Already logged in? Check token validity
    (async () => {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        try {
          const resp = await fetch(`${API_BASE}/auth/verify`, {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (resp.ok) {
            window.location.href = './index.html';
          }
        } catch {}
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.classList.add('loading');
      errorMsg.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch(`${API_BASE}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || 'Đăng nhập thất bại');
        }

        // Save JWT token
        localStorage.setItem(TOKEN_KEY, data.token);

        // Success animation
        btn.style.background = 'linear-gradient(135deg, #4ade80, #22c55e)';
        btn.querySelector('.btn-text').innerHTML = '<span>✓ Đăng nhập thành công!</span>';
        setTimeout(() => { window.location.href = './index.html'; }, 600);

      } catch (err) {
        btn.classList.remove('loading');
        document.getElementById('errorText').textContent = err.message || 'Đăng nhập thất bại!';
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('showPwBtn');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? 'Ẩn' : 'Hiện';
    }
  </script>
</body>
</html>
