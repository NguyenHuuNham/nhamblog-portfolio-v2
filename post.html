  <div class="container" id="postRenderZone">
    <!-- Loading state -->
    <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;">
      <div style="width:44px;height:44px;border:3px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="color:var(--text-muted);font-size:0.95rem;">Đang tải bài viết...</p>
    </div>
  </div>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .post-detail-content h2 { padding-bottom: 0.5rem; border-bottom: 1px solid var(--glass-border); }
    .post-detail-content h3 { color: var(--text-main); }
    .post-detail-content pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-family: var(--font-mono);
      font-size: 0.88rem;
      line-height: 1.7;
    }
    [data-theme="light"] .post-detail-content pre { background: rgba(0,0,0,0.06); }
    .post-detail-content code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: rgba(0,212,255,0.08);
      color: #00d4ff;
      padding: 0.15em 0.45em;
      border-radius: 5px;
    }
    .post-detail-content pre code {
      background: none; color: #e2e8f0; padding: 0; font-size: 0.9rem;
    }
    [data-theme="light"] .post-detail-content pre code { color: #1e293b; }
    .post-detail-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: rgba(0,212,255,0.05);
      border-radius: 0 12px 12px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    .post-detail-content a { color: var(--accent); text-decoration: underline; }
    .post-detail-content table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; }
    .post-detail-content th, .post-detail-content td { padding: 0.75rem 1rem; border: 1px solid var(--glass-border); }
    .post-detail-content th { background: rgba(255,255,255,0.05); font-weight: 600; }
    [data-theme="light"] .comment-form-wrap { background: rgba(255,255,255,0.6); }
    [data-theme="light"] .like-btn-main { background: rgba(0,0,0,0.03); }
  </style>
