<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết bài viết — Nhâm Mobile Dev</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));</script>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    /* Styling for Post Detail Page */
    .post-hero {
      padding: calc(6rem + 60px) 0 4rem;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .post-hero::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
      opacity: 0.1;
      pointer-events: none;
    }
    .post-detail-tag {
      display: inline-block;
      margin-bottom: 1rem;
      padding: 0.4rem 1rem;
      background: var(--accent-dim);
      color: var(--accent2);
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .post-detail-title {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.2;
      max-width: 900px;
      margin: 0 auto 1.5rem;
      color: var(--text);
    }
    .post-detail-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      color: var(--text2);
      font-size: 0.95rem;
      font-weight: 500;
    }
    .post-detail-cover {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 3rem;
      border-radius: var(--r-md);
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      aspect-ratio: 2/1;
      border: 1px solid var(--border);
    }
    .post-detail-cover img {
      width: 100%; height: 100%; object-fit: cover;
    }
    
    .post-detail-content {
      max-width: 800px;
      margin: 0 auto 4rem;
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text);
    }
    .post-detail-content p { margin-bottom: 1.5rem; }
    .post-detail-content h2 { margin: 2rem 0 1rem; font-size: 1.8rem; font-weight: 800; color: #fff; }
    .post-detail-content ul, .post-detail-content ol { padding-left: 1.5rem; margin-bottom: 1.5rem; }
    .post-detail-content li { margin-bottom: 0.5rem; }
    
    /* Post Actions */
    .post-actions {
      display: flex; justify-content: center; gap: 2rem;
      margin: 3rem 0; padding: 2rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .action-btn {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--bg2); border: 1px solid var(--border);
      padding: 0.8rem 1.5rem; border-radius: 100px;
      font-size: 1rem; font-weight: 600; color: var(--text);
      cursor: pointer; transition: var(--t);
    }
    .action-btn:hover { background: var(--bg3); transform: translateY(-2px); }
    .action-btn.liked { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); }
    .action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
    
    .rating-wrap {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .stars { display: flex; gap: 0.2rem; cursor: pointer; }
    .stars svg { width: 24px; height: 24px; fill: none; stroke: #fbbf24; stroke-width: 2; transition: var(--t); }
    .stars svg.active { fill: #fbbf24; }
    .stars svg:hover ~ svg { fill: none !important; }
    .rating-info { font-size: 0.9rem; color: var(--text2); font-weight: 500; }
    
    /* Comments */
    .comments-section {
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: 5rem;
    }
    .comments-title {
      font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem;
      display: flex; align-items: center; gap: 0.8rem;
    }
    .comment-form {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 1.5rem;
      margin-bottom: 3rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .comment-input {
      width: 100%; min-height: 100px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 1rem;
      font-family: inherit; font-size: 1rem; color: var(--text);
      resize: vertical; margin-bottom: 1rem;
      transition: var(--t);
    }
    .comment-input:focus { outline: none; border-color: var(--accent); }
    .comment-submit {
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff; border: none; padding: 0.8rem 1.5rem;
      border-radius: var(--r-sm); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: var(--t);
    }
    .comment-submit:hover { opacity: 0.9; transform: translateY(-2px); }
    
    .comment-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .comment-item {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 1.5rem; display: flex; gap: 1.2rem;
      animation: fadeIn 0.4s ease both;
    }
    .comment-avatar {
      width: 45px; height: 45px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .comment-body { flex: 1; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .comment-author { font-weight: 700; font-size: 1rem; }
    .comment-date { font-size: 0.8rem; color: var(--text3); }
    .comment-text { font-size: 0.95rem; color: var(--text2); line-height: 1.6; }
    
    .not-found { text-align: center; padding: 10rem 1rem; }
    .not-found h1 { font-size: 3rem; margin-bottom: 1rem; }

    @media (max-width: 768px) {
      .post-detail-title { font-size: 2rem; }
      .post-actions { flex-direction: column; align-items: center; gap: 1.5rem; }
      .comment-item { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
