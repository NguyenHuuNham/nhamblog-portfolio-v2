<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird (Bản Web) — Nhâm Mobile Dev</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/redesign.css?v=20260612">
  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #1a1a2e 0%, #080810 100%); overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    #game-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100vh;
      position: relative;
    }
    canvas {
      background: #70c5ce;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border-radius: 8px;
      touch-action: manipulation;
    }
    .back-btn {
      position: absolute; top: 20px; left: 20px;
      z-index: 10; padding: 10px 20px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 100px; text-decoration: none;
      font-weight: 600; font-size: 0.9rem; transition: 0.2s;
      backdrop-filter: blur(10px);
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); color: #fff;}
    #score-display {
      position: absolute; top: 15%; font-size: 4rem; font-weight: 900;
      color: #fff; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000; z-index: 5;
      pointer-events: none;
      font-family: monospace;
    }
    #overlay-ui {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
      z-index: 20; color: #fff; text-align: center;
    }
    .hidden { display: none !important; }
    #start-btn, #restart-btn {
      margin-top: 20px; padding: 12px 30px; font-size: 1.2rem; font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #edfc34);
      color: #000; border: none; border-radius: 100px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); transition: 0.2s;
      text-transform: uppercase;
    }
    #start-btn:hover, #restart-btn:hover { transform: scale(1.05); }
    #best-score { font-size: 1.2rem; color: #fbbf24; font-weight: 700; margin-top: 10px; text-shadow: 1px 1px 0 #000; }
  </style>
</head>
<body>
  <a href="./projects.html" class="back-btn">← Trở về Portfolio</a>
  <div id="game-container">
    <div id="score-display">0</div>
    <div style="position:relative">
      <canvas id="flappyCanvas" width="360" height="640"></canvas>
      <div id="overlay-ui">
        <h1 id="overlay-title" style="font-size:3.5rem;margin-bottom:10px;text-shadow: 3px 3px #000;">FLAPPY</h1>
        <p id="overlay-desc" style="font-size:1.1rem;font-weight:500;">Dùng chuộc click hoặc nhấn phím <kbd style="background:#333;padding:2px 8px;border-radius:4px">SPACE</kbd></p>
        <div id="best-score" class="hidden">Kỷ lục hiện tại: 0</div>
        <button id="start-btn">BẮT ĐẦU CHƠI</button>
        <button id="restart-btn" class="hidden">CHƠI LẠI</button>
      </div>
    </div>
  </div>
  <script src="./js/flappy.js"></script>
</body>
</html>
